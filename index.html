<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The movie sorting grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="search-container">
    <input type="text" id="search-bar" placeholder="Rechercher un film..." autocomplete="off">
    <button id="clear-search-btn" title="Effacer la recherche">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <button id="filter-toggle-btn" title="Filtres avancés">
        <i class="fa-solid fa-sliders"></i>
    </button>
    <button id="random-btn" title="Film aléatoire">
        <i class="fa-solid fa-dice"></i>
    </button>
</div>

<div id="filter-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h3>Filters</h3>
        <span id="sidebar-close-btn">&times;</span>
    </div>
    <div class="sidebar-content">
        <div class="filter-section">
            <h4>Genres</h4>
            <div id="genres-container" class="genres-grid">
            </div>
        </div>

        <div class="filter-section">
            <h4>Release year : <span id="year-range-label"></span></h4>
            <div class="range-slider-wrapper">
                <input type="range" id="year-min" class="slider-min">
                <input type="range" id="year-max" class="slider-max">
            </div>
        </div>

        <div class="filter-section">
            <h4>Duration : <span id="runtime-range-label"></span></h4>
            <div class="range-slider-wrapper">
                <input type="range" id="runtime-min" class="slider-min">
                <input type="range" id="runtime-max" class="slider-max">
            </div>
        </div>

        <button id="reset-filters-btn">Reset filters</button>
    </div>
</div>

<div id="center-target"></div>

<div id="viewport">
    <div id="grid-container"></div>
</div>

<div id="movie-modal" class="modal">
    <div class="modal-poster-placeholder"></div>

    <div class="modal-info-wrapper">
        <div class="modal-info-panel">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title"></h2>

            <div class="modal-meta">
                <span id="modal-date"></span>
                <span class="separator">•</span>
                <span id="modal-duration"></span>
            </div>

            <div id="modal-genres"></div>
            <p id="modal-overview"></p>

            <a id="modal-trailer" href="#" class="trailer-btn">
                <i class="fa-solid fa-play"></i>
                Trailer
            </a>
        </div>
    </div>
</div>

<div id="video-modal">
    <div class="video-modal-content">
        <span class="video-close-btn">&times;</span>
        <iframe id="youtube-iframe" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
